[package]
name = "nogame"
version = "0.1.0"
authors = ["ametel01"]
license = "MIT"
edition = '2023_01'

[dependencies]
openzeppelin_access = "2.0.0"
openzeppelin_token = "2.0.0"
openzeppelin_upgrades = "2.0.0"
openzeppelin_security = "2.0.0"
openzeppelin_introspection = "2.0.0"
openzeppelin_utils = "2.0.0"
nogame_fixed = { git = "https://github.com/ametel01/nogame-fixed.git", rev = "5317597" }
starknet = "2.12.2"

[dev-dependencies]
snforge_std = "0.50.0"

[tool.fmt]
sort-module-level-items = true

# [profile.dev.cairo]
# unstable-add-statements-code-locations-debug-info = true
# unstable-add-statements-functions-debug-info = true
# inlining-strategy = "avoid"

[scripts]
test = "snforge test"
declare = "sh scripts/sepolia/declare.sh"
deploy = "sh scripts/sepolia/deploy.sh"
len = "sh scripts/sierra_len.sh"

[[target.starknet-contract]]
allowed-libfuncs-list.name = "audited"
sierra = true
casm = true

[tool.snforge]
exit_first = false
